name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: 14.225.198.211
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /root/memories
            GIT_SSH_COMMAND='ssh -i /root/.ssh/id_rsa -o IdentitiesOnly=yes' git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml up -d --build
            # Dọn dẹp container thừa
            docker system prune -f
